services:
  mapminer:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./gmapsdata:/app/gmapsdata
    environment:
      - PYTHONUNBUFFERED=1
      - MAPMINER_OUTPUT_DIR=/app/outputs
      - PYTHONPATH=/app
    restart: unless-stopped
    command: >
      sh -c "[ -d .git ] && git pull 2>/dev/null || echo 'Starting server...' && exec python -m uvicorn turbo.server:app --host 0.0.0.0 --port 8000"
