version: '3.8'
services:
  mapminer:
    build: .
    container_name: mapminer
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./gmapsdata:/app/gmapsdata
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: >
      sh -c "git fetch origin main && git stash && git stash pop || true && git pull origin main || echo 'Update skipped, starting server...' && exec python -m uvicorn turbo.server:app --host 0.0.0.0 --port 8000"
